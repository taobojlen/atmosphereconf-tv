<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATmosphereConf TV</title>
<meta name="description" content="Channel-surf through ATmosphereConf 2026 talks like it's 1987.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --tv-body: #3a3024;
    --tv-body-light: #5a4d3a;
    --tv-body-dark: #1e1a14;
    --tv-bezel: #1a1610;
    --screen-glow: rgba(100, 200, 100, 0.08);
    --phosphor: #a0d8a0;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a0e;
    font-family: 'VT323', monospace;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse at 50% 80%, #1a1820 0%, #0a0a0e 70%),
      #0a0a0e;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        90deg,
        transparent 0px, transparent 48px,
        rgba(255,255,255,0.015) 48px, rgba(255,255,255,0.015) 50px
      );
    pointer-events: none;
  }

  .tv-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .antenna {
    position: relative;
    width: 200px;
    height: 80px;
    margin-bottom: -8px;
    z-index: 1;
  }
  .antenna::before, .antenna::after {
    content: '';
    position: absolute;
    bottom: 0;
    width: 4px;
    height: 80px;
    background: linear-gradient(to top, #888, #ccc);
    border-radius: 2px;
  }
  .antenna::before { left: 50px; transform: rotate(-25deg); transform-origin: bottom center; }
  .antenna::after { right: 50px; transform: rotate(25deg); transform-origin: bottom center; }

  .tv {
    position: relative;
    width: min(92vw, 960px);
    background: linear-gradient(160deg, var(--tv-body-light) 0%, var(--tv-body) 40%, var(--tv-body-dark) 100%);
    border-radius: 20px 20px 10px 10px;
    box-shadow:
      0 8px 40px rgba(0,0,0,0.8),
      inset 0 2px 0 rgba(255,255,255,0.08),
      inset 0 -2px 0 rgba(0,0,0,0.3);
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: 1fr auto;
    padding: 20px 20px 0 20px;
    overflow: hidden;
  }

  @media (max-width: 600px) {
    .tv { padding: 12px 12px 0 12px; border-radius: 14px 14px 8px 8px; width: 98vw; }
    .antenna { display: none; }
    .tv-legs { display: none; }
  }

  .screen-bezel {
    position: relative;
    background: var(--tv-bezel);
    border-radius: 12px;
    padding: 8px;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.9), inset 0 0 2px rgba(0,0,0,1);
    overflow: hidden;
    aspect-ratio: 16 / 9;
  }

  .screen {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 6px;
    overflow: hidden;
    background: #000800;
  }

  .screen video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .screen::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
    pointer-events: none;
    z-index: 4;
  }

  .screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
    z-index: 5;
    border-radius: 6px;
  }

  .screen-glare {
    position: absolute;
    top: 8%; left: 12%;
    width: 50%; height: 30%;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.06) 0%, transparent 70%);
    transform: rotate(-8deg);
    pointer-events: none;
    z-index: 6;
  }

  @keyframes flicker {
    0% { opacity: 0.97; } 5% { opacity: 1; } 10% { opacity: 0.98; }
    15% { opacity: 1; } 50% { opacity: 0.99; } 80% { opacity: 1; }
    90% { opacity: 0.98; } 100% { opacity: 0.97; }
  }
  .screen video { animation: flicker 0.15s infinite; }

  .static-overlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.05s;
    background: #111;
  }
  .static-overlay.active { opacity: 1; }
  .static-overlay canvas { width: 100%; height: 100%; }

  @keyframes channel-flash {
    0% { opacity: 1; background: #fff; }
    30% { opacity: 0.8; background: #a0ffa0; }
    100% { opacity: 0; background: transparent; }
  }
  .screen-flash {
    position: absolute; inset: 0; z-index: 8;
    pointer-events: none; opacity: 0;
  }
  .screen-flash.active { animation: channel-flash 0.2s ease-out forwards; }

  .channel-overlay {
    position: absolute;
    top: 20px; right: 24px;
    z-index: 7;
    text-align: right;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .channel-overlay.visible { opacity: 1; }
  .channel-number {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(12px, 2vw, 20px);
    color: #fff;
    text-shadow: 0 0 10px var(--phosphor), 0 0 20px var(--phosphor), 2px 2px 0 rgba(0,0,0,0.8);
    letter-spacing: 4px;
  }
  .channel-title {
    font-family: 'VT323', monospace;
    font-size: clamp(14px, 2vw, 22px);
    color: #ddd;
    text-shadow: 0 0 8px var(--phosphor), 1px 1px 0 #000;
    margin-top: 4px;
    max-width: 400px;
    text-decoration: none;
    pointer-events: auto;
    display: block;
    cursor: pointer;
  }
  .channel-title:hover {
    color: #fff;
    text-decoration: underline;
  }

  .standby {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 3;
    background: #000a00;
  }
  .standby.hidden { display: none; }
  .standby-text {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 2.2vw, 18px);
    color: var(--phosphor);
    text-shadow: 0 0 15px var(--phosphor), 0 0 30px rgba(100,200,100,0.3);
    text-align: center; line-height: 2.2;
    animation: standby-pulse 3s ease-in-out infinite;
  }
  @keyframes standby-pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
  .standby-subtitle {
    font-family: 'VT323', monospace;
    font-size: clamp(14px, 2.5vw, 24px);
    color: rgba(160, 216, 160, 0.6);
    margin-top: 24px;
    text-shadow: 0 0 8px rgba(100,200,100,0.3);
  }

  .tv-controls {
    display: flex; flex-direction: row; align-items: center; justify-content: center;
    padding: 12px 16px; gap: 24px;
  }

  .tv-brand {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: rgba(180, 165, 140, 0.7);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center; line-height: 1.6;
  }

  .dial-housing { position: relative; width: 48px; height: 48px; }
  .dial-ring {
    position: absolute; inset: 0; border-radius: 50%;
    background: linear-gradient(145deg, #555, #222);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.1);
  }
  .dial {
    position: absolute; inset: 4px; border-radius: 50%;
    background: linear-gradient(145deg, #888, #444);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
    transition: transform 0.15s;
    user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .dial:active { transform: rotate(30deg); }
  .dial::after {
    content: ''; width: 3px; height: 16px;
    background: #222; border-radius: 2px;
    position: absolute; top: 8px;
  }

  .power-led {
    width: 8px; height: 8px; border-radius: 50%;
    background: #330000;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
    transition: all 0.3s;
  }
  .power-led.on {
    background: #00ff00;
    box-shadow: 0 0 4px #00ff00, 0 0 10px rgba(0,255,0,0.4);
  }

  .speaker {
    width: 120px; height: 28px;
    background: repeating-linear-gradient(90deg, var(--tv-body-dark) 0px, var(--tv-body-dark) 2px, var(--tv-body) 2px, var(--tv-body) 5px);
    border-radius: 4px;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
  }

  .tv-legs { display: flex; justify-content: center; gap: 500px; }
  .tv-leg {
    width: 16px; height: 28px;
    background: linear-gradient(to bottom, var(--tv-body-dark), #111);
    border-radius: 0 0 4px 4px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.5);
  }

  @media (max-width: 600px) {
    .speaker { width: 60px; }
    .dial-housing { width: 40px; height: 40px; }
    .tv-brand { font-size: 6px; }
    .tv-controls { gap: 12px; padding: 8px; }
  }

  .screen video { filter: contrast(1.1) saturate(0.9) brightness(1.05); }

  .loading-indicator {
    position: absolute;
    bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 7;
    font-family: 'VT323', monospace; font-size: 18px;
    color: var(--phosphor);
    text-shadow: 0 0 8px var(--phosphor);
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .loading-indicator.visible { opacity: 1; }

  /* Muted indicator */
  .muted-indicator {
    position: absolute;
    bottom: 16px; left: 16px;
    z-index: 7;
    font-family: 'VT323', monospace;
    font-size: 20px;
    color: rgba(255, 255, 255, 0.6);
    text-shadow: 0 0 6px rgba(0,0,0,0.8);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .muted-indicator.visible { opacity: 1; }
  .muted-indicator.fade-out { opacity: 0; transition: opacity 1.5s; }

  .source-link {
    font-family: 'VT323', monospace;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.25);
    text-decoration: none;
    margin-top: 8px;
  }
  .source-link:hover { color: rgba(255, 255, 255, 0.5); }
</style>
</head>
<body>

<div class="tv-wrapper">
  <div class="antenna">
  </div>

  <div class="tv">
    <div class="screen-bezel">
      <div class="screen" id="screen">
        <video id="video" playsinline></video>
        <audio id="audio" preload="none"></audio>
        <div class="screen-glare"></div>
        <div class="static-overlay" id="static"><canvas id="staticCanvas"></canvas></div>
        <div class="screen-flash" id="flash"></div>
        <div class="channel-overlay" id="channelOverlay">
          <div class="channel-number" id="channelNumber">CH 00</div>
          <a class="channel-title" id="channelTitle" target="_blank" rel="noopener"></a>
        </div>
        <div class="loading-indicator" id="loadingIndicator">TUNING...</div>
        <div class="muted-indicator" id="mutedIndicator">LOADING SOUND ///</div>
        <div class="standby" id="standby">
          <div class="standby-text">ATmosphereConf<br>2026</div>
          <div class="standby-subtitle">turn the dial to start</div>
        </div>
      </div>
    </div>

    <div class="tv-controls">
      <div class="tv-brand">ATMO<br>SPHERE</div>
      <div class="dial-housing">
        <div class="dial-ring"></div>
        <div class="dial" id="channelDial" role="button" aria-label="Change channel" tabindex="0"></div>
      </div>
      <div class="power-led" id="led"></div>
      <div class="speaker"></div>
    </div>
  </div>

  <div class="tv-legs">
    <div class="tv-leg"></div>
    <div class="tv-leg"></div>
  </div>
  <a class="source-link" href="https://github.com/taobojlen/atmosphereconf-tv" target="_blank" rel="noopener">source code</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<script>
(function() {
  'use strict';

  const PDS = 'https://iameli.com';
  const REPO = 'did:plc:rbvrr34edl5ddpuwcubjiost';
  const COLLECTION = 'place.stream.video';
  const PLAYBACK = 'https://vod-beta.stream.place/xrpc';

  const video = document.getElementById('video');
  const audioEl = document.getElementById('audio');
  const dial = document.getElementById('channelDial');
  const led = document.getElementById('led');
  const standby = document.getElementById('standby');
  const staticOverlay = document.getElementById('static');
  const staticCanvas = document.getElementById('staticCanvas');
  const flash = document.getElementById('flash');
  const channelOverlay = document.getElementById('channelOverlay');
  const channelNumber = document.getElementById('channelNumber');
  const channelTitle = document.getElementById('channelTitle');
  const loadingIndicator = document.getElementById('loadingIndicator');
  const mutedIndicator = document.getElementById('mutedIndicator');

  let vods = [];
  let currentChannel = -1;
  let gen = 0;
  let overlayTimeout = null;
  let switching = false;
  let hls = null;
  let staticCtx = staticCanvas.getContext('2d');
  let staticAnimFrame = null;

  // --- Static TV audio (white noise via Web Audio API) ---
  let staticAudioCtx = null;
  let staticNoiseNode = null;
  let staticGainNode = null;

  function startStaticAudio() {
    try {
      if (!staticAudioCtx) {
        staticAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (staticAudioCtx.state === 'suspended') staticAudioCtx.resume();
      if (staticNoiseNode) return;

      const bufferSize = staticAudioCtx.sampleRate;
      const noiseBuffer = staticAudioCtx.createBuffer(1, bufferSize, staticAudioCtx.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

      staticNoiseNode = staticAudioCtx.createBufferSource();
      staticNoiseNode.buffer = noiseBuffer;
      staticNoiseNode.loop = true;

      staticGainNode = staticAudioCtx.createGain();
      staticGainNode.gain.value = 0.015;

      staticNoiseNode.connect(staticGainNode);
      staticGainNode.connect(staticAudioCtx.destination);
      staticNoiseNode.start();
    } catch (e) {}
  }

  function stopStaticAudio() {
    if (staticNoiseNode) {
      try {
        if (staticGainNode) staticGainNode.gain.setTargetAtTime(0, staticAudioCtx.currentTime, 0.02);
        setTimeout(() => {
          try { staticNoiseNode.stop(); } catch (e) {}
          staticNoiseNode = null;
          staticGainNode = null;
        }, 80);
      } catch (e) {
        staticNoiseNode = null;
        staticGainNode = null;
      }
    }
  }

  async function fetchVods() {
    let all = [];
    let cursor;
    do {
      const p = new URLSearchParams({ repo: REPO, collection: COLLECTION, limit: '100' });
      if (cursor) p.set('cursor', cursor);
      const data = await (await fetch(`${PDS}/xrpc/com.atproto.repo.listRecords?${p}`)).json();
      all = all.concat(data.records || []);
      cursor = data.cursor;
    } while (cursor);

    try {
      const text = await (await fetch('/denied-vods.json')).text();
      const denied = JSON.parse(text.replace(/\/\/.*$/gm, ''));
      const denySet = new Set(denied);
      const before = all.length;
      all = all.filter(r => !denySet.has(r.uri));
      if (before !== all.length) console.log(`[TV] Filtered out ${before - all.length} denied VODs`);
    } catch (e) {}

    return all;
  }

  // --- Parse HLS playlist (for audio track only) ---
  function parsePlaylist(text) {
    const lines = text.split('\n');
    let initUri = null;
    const segments = [];
    let dur = 0, off = 0, len = 0;
    for (const line of lines) {
      const l = line.trim();
      if (l.startsWith('#EXT-X-MAP:')) {
        const m = l.match(/URI="([^"]+)"/);
        if (m) initUri = m[1];
      } else if (l.startsWith('#EXTINF:')) {
        dur = parseFloat(l.split(':')[1]);
      } else if (l.startsWith('#EXT-X-BYTERANGE:')) {
        const parts = l.split(':')[1].split('@');
        len = parseInt(parts[0]);
        if (parts[1] !== undefined) off = parseInt(parts[1]);
      } else if (l && !l.startsWith('#')) {
        segments.push({ uri: l, duration: dur, offset: off, length: len });
        off += len;
      }
    }
    return { initUri, segments };
  }

  function resolveUrl(relative) {
    return `${PLAYBACK}/${relative}`;
  }

  // --- Static noise ---
  function drawStatic() {
    const w = staticCanvas.width = (staticCanvas.offsetWidth / 2) || 160;
    const h = staticCanvas.height = (staticCanvas.offsetHeight / 2) || 90;
    const img = staticCtx.createImageData(w, h);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = Math.random() * 255;
      d[i] = d[i+1] = d[i+2] = v;
      d[i+3] = 255;
    }
    staticCtx.putImageData(img, 0, 0);
    staticAnimFrame = requestAnimationFrame(drawStatic);
  }
  function startStatic() {
    staticOverlay.classList.add('active');
    if (!staticAnimFrame) drawStatic();
    startStaticAudio();
  }
  function stopStatic() {
    staticOverlay.classList.remove('active');
    if (staticAnimFrame) { cancelAnimationFrame(staticAnimFrame); staticAnimFrame = null; }
    stopStaticAudio();
  }

  function showChannelInfo(ch, title, uri) {
    channelNumber.textContent = 'CH ' + String(ch).padStart(2, '0');
    channelTitle.textContent = title;
    channelTitle.href = 'https://pds.ls/' + uri;
    channelOverlay.classList.add('visible');
    clearTimeout(overlayTimeout);
  }

  // --- Channel change: pick a random VOD, seek to a random point ---
  async function changeChannel() {
    if (switching || vods.length === 0) return;
    switching = true;
    const myGen = ++gen;
    const stale = () => myGen !== gen;

    // Pick random VOD
    let idx;
    do { idx = Math.floor(Math.random() * vods.length); }
    while (vods.length > 1 && idx === currentChannel);
    currentChannel = idx;

    const record = vods[idx];
    const title = record.value.title || 'Unknown Programme';
    const durationSec = (record.value.duration || 0) / 1e9;
    const uri = record.uri;
    const encodedUri = encodeURIComponent(uri);

    console.log('[TV] Switching to:', title, `(${Math.round(durationSec)}s)`);

    // Visual: flash + static
    flash.classList.remove('active');
    void flash.offsetWidth;
    flash.classList.add('active');
    startStatic();
    standby.classList.add('hidden');
    led.classList.add('on');
    loadingIndicator.classList.add('visible');
    mutedIndicator.classList.remove('visible', 'fade-out');
    showChannelInfo(idx + 1, title, uri);

    // Kill previous playback
    if (hls) { hls.destroy(); hls = null; }
    video.pause(); video.removeAttribute('src'); video.load();
    audioEl.pause(); audioEl.removeAttribute('src');

    await new Promise(r => setTimeout(r, 250));
    if (stale()) { switching = false; return; }

    const randomStart = durationSec > 30 ? Math.random() * durationSec * 0.8 : 0;
    console.log('[TV] Target time:', Math.round(randomStart) + 's');

    // --- Video: hls.js on video-only playlist (track=1) for fast start ---
    const videoOnlyUrl = `${PLAYBACK}/place.stream.playback.getVideoPlaylist?uri=${encodedUri}&track=1`;

    if (!Hls.isSupported()) {
      // Safari — native HLS with full playlist
      const playlistUrl = `${PLAYBACK}/place.stream.playback.getVideoPlaylist?uri=${encodedUri}`;
      video.src = playlistUrl;
      video.currentTime = randomStart;
      try {
        await video.play();
        stopStatic();
        loadingIndicator.classList.remove('visible');
      } catch (e) {
        console.warn('[TV] Playback error:', e);
        stopStatic();
        loadingIndicator.classList.remove('visible');
      }
      switching = false;
      return;
    }

    hls = new Hls({
      startPosition: randomStart,
      maxBufferLength: 30,
      maxMaxBufferLength: 60,
    });

    hls.loadSource(videoOnlyUrl);
    hls.attachMedia(video);

    // Play as soon as manifest is parsed
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      if (stale()) return;
      console.log('[TV] Video manifest parsed');
      video.muted = true;
      video.play().catch(e => console.warn('[TV] Play failed:', e));
    });

    // Hide static once actual frames are rendering
    const onPlaying = () => {
      if (stale()) return;
      video.removeEventListener('playing', onPlaying);
      console.log('[TV] Video playing!');
      stopStatic();
      loadingIndicator.classList.remove('visible');
      mutedIndicator.classList.add('visible');
    };
    video.addEventListener('playing', onPlaying);

    hls.on(Hls.Events.ERROR, (event, data) => {
      if (stale()) return;
      console.warn('[TV] HLS error:', data.type, data.details, data.fatal);
      if (data.fatal) {
        if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
          hls.recoverMediaError();
        } else {
          hls.destroy(); hls = null;
          switching = false;
          changeChannel();
        }
      }
    });

    // --- Audio: fetch in background, sync to video ---
    // The audio track is a single giant fMP4 segment. We fetch it separately
    // and play it in a synced <audio> element so video isn't blocked.
    (async () => {
      try {
        const audioPlaylistUrl = `${PLAYBACK}/place.stream.playback.getVideoPlaylist?uri=${encodedUri}&track=2`;
        const audioText = await (await fetch(audioPlaylistUrl)).text();
        if (stale()) return;
        const audioPl = parsePlaylist(audioText);
        if (!audioPl.segments.length) return;

        const audioSeg = audioPl.segments[0];
        const audioInitUrl = resolveUrl(audioPl.initUri);
        const audioBlobUrl = resolveUrl(audioSeg.uri);

        console.log(`[TV] Loading audio: ${(audioSeg.length/1024/1024).toFixed(1)}MB`);

        const audioInit = await fetch(audioInitUrl, { cache: 'no-store' }).then(r => r.arrayBuffer());
        if (stale()) return;

        const end = audioSeg.offset + audioSeg.length - 1;
        const rangeRes = await fetch(audioBlobUrl, {
          headers: { Range: `bytes=${audioSeg.offset}-${end}` },
          cache: 'no-store',
        });

        let audioData;
        if (rangeRes.status === 206) {
          audioData = await rangeRes.arrayBuffer();
        } else {
          const full = await rangeRes.arrayBuffer();
          if (stale()) return;
          audioData = full.slice(audioSeg.offset, audioSeg.offset + audioSeg.length);
        }
        if (stale()) return;

        console.log(`[TV] Audio fetched: ${(audioData.byteLength/1024/1024).toFixed(1)}MB`);

        const blob = new Blob([audioInit, audioData], { type: 'video/mp4' });
        audioEl.src = URL.createObjectURL(blob);

        await new Promise((resolve, reject) => {
          const done = () => { audioEl.removeEventListener('canplay', done); audioEl.removeEventListener('error', fail); resolve(); };
          const fail = () => { audioEl.removeEventListener('canplay', done); audioEl.removeEventListener('error', fail); reject(audioEl.error); };
          audioEl.addEventListener('canplay', done, { once: true });
          audioEl.addEventListener('error', fail, { once: true });
          setTimeout(resolve, 3000);
        });
        if (stale()) return;

        // Seek audio to match video position, wait for seek, then play
        audioEl.currentTime = video.currentTime;
        console.log('[TV] Audio seeking to', video.currentTime.toFixed(1) + 's');

        await new Promise(r => {
          if (!audioEl.seeking) { r(); return; }
          audioEl.addEventListener('seeked', r, { once: true });
          setTimeout(r, 2000);
        });
        if (stale()) return;

        audioEl.volume = 0;
        await audioEl.play();
        const fadeStart = performance.now();
        (function fadeIn() {
          const t = Math.min(1, (performance.now() - fadeStart) / 1500);
          audioEl.volume = t;
          if (t < 1) requestAnimationFrame(fadeIn);
        })();

        mutedIndicator.classList.add('fade-out');
        mutedIndicator.classList.remove('visible');
        console.log('[TV] Audio playing!');
      } catch (e) {
        console.warn('[TV] Audio load failed (non-fatal):', e);
      }
    })();

    switching = false;
  }

  // --- Events ---
  dial.addEventListener('click', changeChannel);
  dial.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); changeChannel(); }
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
      e.preventDefault();
      changeChannel();
    }
  });

  // --- Init ---
  (async () => {
    try {
      vods = await fetchVods();
      console.log(`Loaded ${vods.length} VODs`);
    } catch (e) {
      console.error('Failed to load VODs:', e);
    }
  })();
})();
</script>
